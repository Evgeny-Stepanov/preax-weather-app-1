<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>WeatherApp</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="style.css"
    />
    <script
      src="script.js"
      type="module"
    ></script>
  </head>

  <body class="body">
    <div class="container">
      <header class="header">
        <div class="logo">
          <svg
            width="192"
            height="31"
            role="img"
            aria-label="Логотип Weather App"
          >
            <use href="public/sprite.svg#logo"></use>
          </svg>
        </div>

        <search class="search header__search">
          <form action="#">
            <label
              for="search"
              class="visually-hidden"
            >
              Введите название города
            </label>
            <input
              type="search"
              id="search"
              class="search__input"
              placeholder="Поиск по городу"
              autocomplete="off"
            />

            <div class="search__loupe">
              <svg
                width="20"
                height="20"
                aria-hidden="true"
              >
                <use href="public/sprite.svg#loupe"></use>
              </svg>
            </div>

            <button
              type="reset"
              class="search__button"
              aria-label="Очистить поле ввода города"
            >
              <svg
                width="16"
                height="16"
                aria-hidden="true"
              >
                <use href="public/sprite.svg#cross"></use>
              </svg>
            </button>
          </form>
        </search>
      </header>

      <main>
        <h1 class="visually-hidden">Приложение погоды Weather App</h1>

        <section class="weather">
          <div class="weather__details details">
            <h2 class="details__title">Москва</h2>
            <p class="details__now">
              <time datetime="2026-01-06T11:29">
                <span class="details__date">Суббота, 06 января</span>
                <span class="details__time">11:29</span>
              </time>
            </p>
            <p class="details__temperature">-7&deg;</p>
            <p class="details__condition">Облачно</p>
            <p class="details__feeling">Ощущается как -11&deg;</p>
          </div>
        </section>

        <section class="slider"></section>
      </main>

      <footer class="footer"></footer>
    </div>
  </body>
</html>
