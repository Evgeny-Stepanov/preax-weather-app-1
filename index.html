<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>WeatherApp</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="style.css"
    />
    <script
      src="script.js"
      type="module"
    ></script>
  </head>

  <body class="body">
    <div class="container">
      <header class="header">
        <div class="logo">
          <svg
            width="192"
            height="31"
            aria-label="Логотип Weather App"
          >
            <use href="public/sprite.svg#logo"></use>
          </svg>
        </div>

        <search class="search header__search">
          <form action="#">
            <label
              for="search"
              class="visually-hidden"
            >
              Введите название города
            </label>
            <input
              type="search"
              id="search"
              class="search__input"
              placeholder="Поиск по городу"
              autocomplete="off"
            />

            <div class="search__loupe">
              <svg
                width="20"
                height="20"
                aria-hidden="true"
              >
                <use href="public/sprite.svg#loupe"></use>
              </svg>
            </div>

            <button
              type="reset"
              class="search__button"
              aria-label="Очистить поле ввода города"
            >
              <svg
                width="16"
                height="16"
                aria-hidden="true"
              >
                <use href="public/sprite.svg#cross"></use>
              </svg>
            </button>
          </form>
        </search>
      </header>

      <main>
        <h1 class="visually-hidden">Приложение погоды Weather App</h1>

        <div class="flex-row">
          <section class="overview">
            <h2 class="visually-hidden">Общая информация</h2>
            <h3 class="overview__location"></h3>
            <p class="overview__now">
              <time datetime="2026-01-06T11:29">
                <span class="overview__date"></span>
                <span class="overview__time"></span>
              </time>
            </p>
            <p class="overview__temperature"></p>
            <p class="overview__condition"></p>
            <p class="overview__feeling"></p>
          </section>

          <section class="details">
            <h2 class="visually-hidden">Подробная информация о погоде</h2>
            <ul class="details__cards"></ul>
          </section>
        </div>

        <section class="slider"></section>
      </main>

      <footer class="footer"></footer>
    </div>

    <template id="card-template">
      <li class="details__card card">
        <h3 class="card__title"></h3>
        <div class="card__icon">
          <img
            alt=""
            width="32"
            height="32"
          />
        </div>
        <p class="card__metric">
          <span class="card__value"></span>
          <span aria-hidden="true"></span>
          <span class="visually-hidden"></span>
          <time></time>
        </p>
        <div class="card__range">
          <span class="card__range-circle"></span>
        </div>
        <p class="card__text">
          <span class="card__word card__word--left"></span>
          <span class="card__word card__word--right"></span>
        </p>
      </li>
    </template>
  </body>
</html>
